spring:
  application:
    name: novawallet-api

  profiles:
    active: dev

  jpa:
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false


server:
  servlet:
    context-path: /api


management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info


springdoc:
  swagger-ui:
    path: /swagger-ui.html

  api-docs:
    path: /api-docs