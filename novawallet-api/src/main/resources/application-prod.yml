# =============================================================================
# NovaWallet — Production Profile
#
# All secrets come from environment variables — never hard-code values here.
# =============================================================================

spring:

  # ── Database ───────────────────────────────────────────────────────────────
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Mail ───────────────────────────────────────────────────────────────────
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:true}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ── Jackson ────────────────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false

# ── Server ───────────────────────────────────────────────────────────────────
server:
  servlet:
    context-path: /api

# ── Management / Actuator ────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# ── Application Info ─────────────────────────────────────────────────────────
info:
  app:
    name: NovaWallet API
    description: Digital wallet backend system
    version: 0.0.1

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:900000}

# ── Application Settings ─────────────────────────────────────────────────────
app:

  admin:
    first-name: ${APP_ADMIN_FIRST_NAME:Admin}
    last-name: ${APP_ADMIN_LAST_NAME:User}
    email: ${APP_ADMIN_EMAIL:admin@novawallet.com}
    password: ${APP_ADMIN_PASSWORD:Admin@123}
    phone: ${APP_ADMIN_PHONE:+260000000000}

  mail:
    from: ${APP_MAIL_FROM:noreply@novawallet.com}

  sms:
    api-key: ${APP_SMS_API_KEY:}

  rate-limit:
    login:
      max-attempts: 5
      lockout-minutes: 15
    global:
      max-requests: 100
      auth-max-requests: 10
      window-seconds: 60

  idempotency:
    ttl-hours: 24

  kyc:
    upload-dir: /app/uploads/kyc
    tiers:
      1:
        name: Basic
        wallet-limit: 5000
        daily-send-limit: 2000
        required-documents:
          - NATIONAL_ID
      2:
        name: Standard
        wallet-limit: 50000
        daily-send-limit: 20000
        required-documents:
          - NATIONAL_ID
          - SELFIE
      3:
        name: Advanced
        wallet-limit: 200000
        daily-send-limit: 100000
        required-documents:
          - NATIONAL_ID
          - SELFIE
          - PROOF_OF_ADDRESS

  cors:
    origins: ${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# ── Logging — JSON format for log aggregation ────────────────────────────────
logging:
  level:
    root: INFO
    com.novawallet: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.flywaydb: INFO

# ── SpringDoc / Swagger ──────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
